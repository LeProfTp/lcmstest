<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LCM Communication Explorer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff;color:#000;line-height:1.6;display:flex;flex-direction:column;min-height:100vh}.container{max-width:900px;margin:0 auto;padding:2rem;flex:1}footer{background:#fafafa;border-top:1px solid #ccc;padding:1rem 2rem;text-align:center;font-size:0.85rem;color:#666;margin-top:2rem}.screen{display:none}.screen.active{display:block;animation:fadeIn 0.3s}@keyframes fadeIn{from{opacity:0}to{opacity:1}}h1{font-size:1.6rem;margin-bottom:0.8rem;font-weight:700}h2{font-size:1.1rem;margin:1rem 0 0.5rem 0;font-weight:600}p{margin-bottom:0.8rem;font-size:0.95rem}.section-box{background:#fafafa;border-left:4px solid #000;padding:1rem;margin:1rem 0;border-radius:2px;font-size:0.95rem;line-height:1.7}.form-group{margin-bottom:1rem}label{display:block;font-weight:500;margin-bottom:0.3rem;font-size:0.95rem}input[type="text"],input[type="number"],select,textarea{width:100%;padding:0.65rem;border:1px solid #ccc;border-radius:3px;font-family:inherit;font-size:0.95rem;background:#fafafa}textarea{resize:vertical;min-height:80px;font-family:monospace;font-size:0.8rem}input:focus,select:focus,textarea:focus{outline:0;border-color:#000;background:#fff}.button-group{display:flex;gap:1rem;margin-top:1.5rem;justify-content:space-between;flex-wrap:wrap}button{padding:0.65rem 1.3rem;border:1px solid #000;background:#000;color:#fff;cursor:pointer;font-size:0.9rem;font-weight:600;border-radius:3px;transition:all 0.2s}button:hover{background:#333}button:disabled{opacity:0.5;cursor:not-allowed}.btn-secondary{background:#fff;color:#000;border:1px solid #ccc}.btn-secondary:hover{background:#f5f5f5}.code-block{background:#f5f5f5;border-left:3px solid #000;padding:0.8rem;margin:0.8rem 0;overflow-x:auto;font-family:monospace;font-size:0.75rem;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;max-height:300px;overflow-y:auto}.mode-btn{flex:1;padding:1rem;border:2px solid #ccc;background:#fff;cursor:pointer;border-radius:4px;text-align:center;font-weight:600;font-size:0.95rem;color:#000}.mode-btn:hover{border-color:#000;background:#f5f5f5}.mode-btn.selected{border-color:#000;background:#000;color:#fff}.rating-group{margin-bottom:1.5rem}.rating-label{font-weight:600;margin-bottom:0.5rem;display:block}.rating-scale{display:flex;gap:0.3rem}.rating-btn{width:44px;height:44px;padding:0;border:2px solid #ccc;background:#fff;color:#000;cursor:pointer;font-weight:700;font-size:0.9rem;border-radius:3px;transition:all 0.2s}.rating-btn:hover{border-color:#000;background:#f0f0f0}.rating-btn.selected{background:#000;color:#fff;border-color:#000}.pairwise-choice-btn{padding:0.65rem 1.3rem;border:1px solid #000;background:#fff;color:#000;cursor:pointer;font-size:0.9rem;font-weight:600;border-radius:3px;transition:all 0.2s}.pairwise-choice-btn:hover{background:#f5f5f5}.pairwise-choice-btn.selected{background:#000;color:#fff}.answer-card{background:#f9f9f9;border:1px solid #000;border-radius:4px;padding:1.2rem;margin:1rem 0}.answer-label{font-size:0.85rem;font-weight:700;margin-bottom:0.5rem;color:#666}.answer-text{font-size:0.9rem;line-height:1.6;word-wrap:break-word}.pairwise-btns{display:flex;gap:0.8rem;margin-top:1rem}.pairwise-btns button{flex:1}.completion-card{background:linear-gradient(135deg,#f9f9f9 0%,#f5f5f5 100%);border:2px solid #000;border-radius:4px;padding:1.5rem;margin:1rem 0;text-align:center}</style></head><body><div class="container"><div class="screen active" id="screen0"><h1 style="margin-top:2rem;text-align:center">LCM Communication Explorer</h1><p style="margin:1.5rem 0;color:#666;text-align:center">Choose language / Wähle Sprache</p><div style="display:flex;gap:1rem;max-width:300px;margin:0 auto"><button onclick="app.setLanguage('DE')" style="flex:1" v class="section-box" id="p15"></div><div class="section-box" id="p15what" style="background:#fff9f3"></div><div class="code-block" id="ep2question"></div><div class="button-group"><button class="btn-secondary" onclick="app.backScreen()">← Back</button><button onclick="app.nextScreen()">Start Episode 2 →</button></div></div><div class="screen" id="screen16"><h1 id="h16"></h1><div class="code-block" id="prompt16"></div><button onclick="app.copyPrompt('prompt16')" style="padding:0.4rem 0.9rem;font-size:0.85rem">📋 Copy</button><div class="form-group"><label id="l16"></label><textarea id="output16"></textarea></div><div class="button-group"><button class="btn-secondary" onclick="app.backScreen()">← Back</button><button onclick="app.nextScreen()" id="btn16" disabled>Next →</button></div></div><div class="screen" id="screen17"><h1 id="h17"></h1><div class="code-block" id="prompt17"></div><button onclick="app.copyPrompt('prompt17')" style="padding:0.4rem 0.9rem;font-size:0.85rem">📋 Copy</button><div class="form-group"><label id="l17"></label><textarea id="output17"></textarea></div><div class="button-group"><button class="btn-secondary" onclick="app.backScreen()">← Back</button><button onclick="app.nextScreen()" id="btn17" disabled>Next →</button></div></div><div class="screen" id="screen18"><h1 id="h18"></h1><div class="code-block" id="prompt18"></div><button onclick="app.copyPrompt('prompt18')" style="padding:0.4rem 0.9rem;font-size:0.85rem">📋 Copy</button><div class="form-group"><label id="l18"></label><textarea id="output18"></textarea></div><div class="button-group"><button class="btn-secondary" onclick="app.backScreen()">← Back</button><button onclick="app.nextScreen()" id="btn18" disabled>Next →</button></div></div><div class="screen" id="screen19"><h1 id="h19"></h1><div class="code-block" id="prompt19"></div><button onclick="app.copyPrompt('prompt19')" style="padding:0.4rem 0.9rem;font-size:0.85rem">📋 Copy</button><div class="form-group"><label id="l19"></label><textarea id="output19"></textarea></div><div class="button-group"><button class="btn-secondary" onclick="app.backScreen()">← Back</button><button onclick="app.nextScreen()" id="btn19" disabled>Next →</button></div></div><div class="screen" id="screen20"><h1 id="h20"></h1><div class="section-box" id="p20"></div><div id="ratingContainer2"></div><div class="button-group"><button class="btn-secondary" onclick="app.backScreen()">← Back</button><button onclick="app.nextScreen()" id="btn20" disabled>Finish →</button></div></div><div class="screen" id="screen21"><div class="completion-card"><div style="font-size:3rem;margin-bottom:1rem">🎉</div><h1 id="h21"></h1><p id="p21"></p><p id="submitStatus" style="margin-top:1rem;font-weight:600"></p></div><div class="button-group"><button class="btn-secondary" onclick="app.startOtherMode()" id="btnOther">Start Other Mode</button></div></div></div><footer>Created by Prof. Thomas Petzold Ph.D., Dr. Lothar Hotz & Claude, 2026</footer><script>const SUBMISSION_ENDPOINT="https://script.google.com/macros/s/AKfycbza0YEt8e70Ajsh4SR2QKiqhaJEPli6pNesVlp10H3RRrBKViECW9dA8dV2MA5n54rX8Q/exec";const SUBMISSION_TOKEN="lcm2026-petzold-hotz";const text={DE:{welcome:{h:"LCM Communication Explorer",p:"Willkommen zur Studie über KI-Kommunikation. In dieser Studie testest du zwei verschiedene Ansätze, wie KI-Systeme besser als heute mit Menschen kommunizieren könnten. Abhängig von deiner Wahl durchläufst du entweder eine kurze Studie (LCM-Light, ~10 Min) oder eine umfassendere Studie (LCM Extended, ~20 Min)."},mode:{h:"Forschungsmodus",p:"Wähle deinen Forschungsmodus:\n\n**LCM-Light:** Testet, ob explizite Reflexion (Partner-Modell + Self-Modell) bessere Antworten erzeugt als eine Baseline.\n\n**LCM Extended:** Testet zusätzlich, ob KI-Systeme über mehrere Episoden hinweg lernen können."},consent:{h:"Einverständnis",p:"Du hilfst uns zu verstehen, wie KI-Systeme besser als heute mit Menschen kommunizieren könnten. Deine Teilnahme ist völlig freiwillig. Alle deine Daten werden anonym gespeichert.",l:"Ich stimme zu."},info:{h:"Über dich",p:"Um die Ergebnisse besser einordnen zu können, stellen wir dir ein paar kurze Fragen.",lAge:"Wie alt bist du?",lExp:"Wie viel Erfahrung hast du mit KI-Modellen?",opts:["nie genutzt","selten genutzt","gelegentlich genutzt","häufig genutzt","täglich genutzt"]},llm:{h:"KI-Modell",p:"Wähle das KI-Modell, das du für diese Studie verwenden möchtest. Du musst dieses Modell selbst haben – der Explorer stellt kein Modell bereit.",l:"Welches KI-Modell nutzt du?"},llm_warning:"Wichtig: Du wirst gleich Prompts erhalten, die du in ein Chat-Fenster deines gewählten Modells kopieren musst. Öffne immer ein neues, leeres Chat-Fenster für jeden Prompt, damit der Kontext sauber bleibt und die Antworten nicht durch vorherige Gespräche beeinflusst werden.",baseline:{h:"Baseline: Direkte Frage",why:"**Warum?** Die Baseline ist die einfachste Variante.",task:"Kopiere diese Frage:",whatnext:"Diese Baseline-Antwort werden wir später mit der LCM-Antwort vergleichen.",l:"Baseline-Antwort (von deinem KI-Modell):"},partner:{h:"Partner-Modell",why:"**Warum?** Die KI analysiert zuerst, wer du bist und was du wirklich brauchst.",task:"Kopiere diesen Prompt:",whatnext:"Das Partner-Modell wird danach in der finalen Antwort genutzt.",l:"Partner-Modell (von deinem KI-Modell):"},self:{h:"Self-Modell",why:"**Warum?** Jetzt reflektiert die KI ihre eigene Rolle.",task:"Kopiere diesen Prompt:",whatnext:"Das Self-Modell wird zusammen mit dem Partner-Modell genutzt.",l:"Self-Modell (von deinem KI-Modell):"},comm:{h:"Kommunikationsmodell",why:"**Warum?** Die KI analysiert die gesamte Kommunikation.",task:"Kopiere diesen Prompt:",whatnext:"Das Kommunikationsmodell wird in der finalen Antwort genutzt.",l:"Kommunikationsmodell (von deinem KI-Modell):"},final:{h:"Finale Antwort",why:"**Warum?** Jetzt antwortet die KI mit allen gesammelten Informationen.",task:"Kopiere diesen Prompt:",whatnext:"Diese finale Antwort wirst du bewerten und mit der Baseline vergleichen.",l:"Finale Antwort (von deinem KI-Modell):"},pairwise:{h:"Vergleich: Welche Antwort ist besser?",p:"Wir zeigen dir beide Antworten nebeneinander. Klick auf A, B oder Tie."},rating:{h:"Bewertung",p:"Bitte bewerte beide Antworten auf verschiedenen Dimensionen. Klicke auf die Zahl, die deine Einschätzung widerspiegelt."},reflect:{h:"Deine Gedanken",p:"Zum Abschluss zur LCM-Antwort (mit Partner + Self): Was war gut? Was fehlte?",whatnext:"Wenn du in Extended-Modus bist, geht es jetzt weiter."},exp:{h:"Experience-Objekt",why:"**Warum?** Die KI fasst zusammen, was sie gelernt hat.",task:"Kopiere diesen Prompt:",whatnext:"Diese Experience wird in Episode 2 genutzt.",l:"Experience-Objekt (von deinem KI-Modell):"},ep2:{h:"Episode 2: Neue Frage mit Experience",p:"Jetzt testest du, ob die KI aus Episode 1 lernt.",whatnext:"Die Episode-2-Antwort wird auch bewertet."},ep2q:"Budget 3.000€, Kinder unsicher beim Fliegen. Was empfiehlst du?",ep2rating:{h:"Episode 2 Bewertung",p:"Knüpft die Antwort sinnvoll an Episode 1 an?"},thanks:{h:"Vielen Dank!",p:"Deine Daten wurden erfolgreich übermittelt. Du hast einen wertvollen Beitrag zur Forschung geleistet!"},export:"Deine Daten:"},EN:{welcome:{h:"LCM Communication Explorer",p:"Welcome to the AI communication study. You test two different approaches to how AI systems could better communicate with people."},mode:{h:"Research Mode",p:"Choose your research mode:\n\n**LCM-Light:** Tests whether explicit reflection produces better answers.\n\n**LCM Extended:** Tests whether AI systems can learn across episodes."},consent:{h:"Consent",p:"You help us understand how AI systems could better communicate. Your participation is entirely voluntary.",l:"I agree."},info:{h:"About You",p:"We ask you a few short questions.",lAge:"How old are you?",lExp:"How much experience with AI models?",opts:["never used","rarely used","occasionally used","often used","use daily"]},llm:{h:"AI Model",p:"Choose the AI model you want to use for this study. You must have access to this model yourself – the Explorer does not provide one.",l:"Which AI model are you using?"},llm_warning:"Important: You will receive prompts that you need to copy into a chat window of your chosen model. Always open a fresh, empty chat window for each prompt to keep the context clean and prevent previous conversations from influencing the answers.",baseline:{h:"Baseline: Direct Question",why:"**Why?** The baseline is the simplest variant.",task:"Copy this question:",whatnext:"We will compare this baseline answer with the LCM answer.",l:"Baseline Answer (from your AI model):"},partner:{h:"Partner Model",why:"**Why?** The AI first analyzes who you are and what you really need.",task:"Copy this prompt:",whatnext:"The Partner Model will be used in the final answer.",l:"Partner Model (from your AI model):"},self:{h:"Self Model",why:"**Why?** The AI reflects on its own role.",task:"Copy this prompt:",whatnext:"The Self Model will be used together with the Partner Model.",l:"Self Model (from your AI model):"},comm:{h:"Communication Model",why:"**Why?** The AI analyzes the entire communication.",task:"Copy this prompt:",whatnext:"The Communication Model will be used in the final answer.",l:"Communication Model (from your AI model):"},final:{h:"Final Answer",why:"**Why?** Now the AI answers with all collected information.",task:"Copy this prompt:",whatnext:"You will rate this final answer and compare it with the baseline.",l:"Final Answer (from your AI model):"},pairwise:{h:"Comparison: Which answer is better?",p:"We show you both answers side-by-side. Click A, B, or Tie."},rating:{h:"Evaluation",p:"Please rate both answers on different dimensions. Click the number that reflects your assessment."},reflect:{h:"Your Thoughts",p:"What was good about the answer? What was missing?",whatnext:"If you are in Extended mode, it continues."},exp:{h:"Experience Object",why:"**Why?** The AI summarizes what it learned.",task:"Copy this prompt:",whatnext:"This experience will be used in Episode 2.",l:"Experience Object (from your AI model):"},ep2:{h:"Episode 2: New Question with Experience",p:"Now you test whether the AI learns from Episode 1's experience.",whatnext:"The Episode 2 answer will also be rated."},ep2q:"Budget 3,000€, children nervous flying. What recommend?",ep2rating:{h:"Episode 2 Evaluation",p:"Does the answer meaningfully connect to Episode 1?"},thanks:{h:"Thank You!",p:"Your data has been successfully submitted. You have made a valuable contribution to research!"},export:"Your Data:"}};const prompts={DE:{baseline:"Ich will mit meiner Familie in den Abenteuerurlaub fahren. Wohin soll ich fahren?",partner:"Du bist ein Spezialist im Verstehen von Gesprächspartnern.\n\nErstelle ein Modell des Partners:\n1. Was wird explizit gewünscht?\n2. Welche impliziten Ziele?\n3. Werte/Präferenzen?\n4. Unsicherheiten?\n\nFrage: Ich will mit meiner Familie in den Abenteuerurlaub fahren. Wohin soll ich fahren?",self:"Du bist ein Spezialist für Selbstreflexion.\n\nErstelle ein Self Model:\n1. Welche Rolle nimmst du ein?\n2. Was ist dein Ziel?\n3. Was sollte deine Antwort bewirken?\n\nFrage: Ich will mit meiner Familie in den Abenteuerurlaub fahren. Wohin soll ich fahren?\n\nPartner-Modell:\n{{partner}}",comm:"Du bist ein Kommunikationsanalyst.\n\nErstelle ein Kommunikationsmodell:\n1. Gemeinsames Thema?\n2. Gemeinsames Ziel?\n3. Offene Fragen?\n\nFrage: Ich will mit meiner Familie in den Abenteuerurlaub fahren. Wohin soll ich fahren?\n\nPartner: {{partner}}\nSelf: {{self}}",light_final:"Du bist ein reflektierter Kommunikationsagent.\n\nBeantworte die Frage. Nutze: Frage + Partner-Modell + Self-Modell.\n\nWICHTIG: Gebe Partner- und Self-Modell NICHT mit aus. Beantworte nur die Frage.\n\nFrage: Ich will mit meiner Familie in den Abenteuerurlaub fahren. Wohin soll ich fahren?\n\nPartner: {{partner}}\nSelf: {{self}}\n\nErzeuge die Antwort.",extended_final:"Du bist ein reflektierter Kommunikationsagent.\n\nBeantw
